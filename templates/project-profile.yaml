# SAGE shared project policy profile (빈 스키마 템플릿)
# sage install 이 배치 → sage-init 이 공유 정책을 채운다. 개인 capability와 private path는
# Git에서 제외되는 sage/project-profile.local.yaml이 소유한다.
# 전문/주석: 마스터 설계 §6.

sage:
  required_version: "0.9.65" # 프로젝트가 요구하는 exact SAGE 버전. local에서 변경 불가

project:
  name: ""
  prefix: "sage"

options:                         # 옵션 플래그 — generator가 읽어 산출물 가감
  cross_model: false             # reviewer 슬롯을 opposite-runtime reviewer로 승격 + opposite 산출물
  codegraph:   optional
  obsidian:    optional

paths:
  framework_docs: "."
  agent_docs: "docs/agent"
  sage_home: "sage"
  plan_docs: "plan_docs"
  component_plan_docs: "{component}/plan_docs"
  # 고정(이동 불가): .claude/ · .codex/ · 루트 CLAUDE.md/CODEX.md

components: []                    # id는 경로 안전·중복 불가 토큰([A-Za-z0-9][A-Za-z0-9_-]{0,79})
                                  # 예: [{ id: backend, paths: ["src/backend/**"], model: opus,
                                  #        runtime_models: { claude: opus, codex: gpt-5.6-terra } }]
                                  # 채우면 `sage generate --kind roster` 가 컴포넌트당 implementer-<id> 에이전트 spec 동적 생성(EH-1).
                                  # model = 작업 강도 티어(opus=고강도 / sonnet=표준). claude-host 는 Claude
                                  # 서브에이전트 모델로 매핑, codex-host 는 명목 티어(codex 자체 모델 사용).
                                  # runtime_models = host CLI에 넘길 실제 모델. `sage models --host <host>`의
                                  # 출처/검증 수준을 확인한 뒤 사용자가 선택. 미설정 host는 CLI default.
                                  # 비우면 team.core 의 고정 implementer-a/b 폴백(하위호환).

risk:                            # pre-implementation-gate / stop-compliance 가 읽는 위험 분류(flat 계약)
  # 경로 글롭(L0 통과 / L1·L2·L3 분류). 빈 리스트 = 해당 레벨 미적용
  l0_pass_globs: []              # 예: ["*.md", "plan_docs/*"] — 문서/plan 즉시 통과
  l0_exclude_globs: []           # 동일 higher-risk path와 결속된 L0 예외. domains.path_globs는 자동 추가
  l1_path_globs: []              # 예: ["**/*.css", "**/static/**"] — 저위험(UI/마크업)
  l2_path_globs: []              # 예: ["src/**", "**/*.config.*"] — 소스/설정(build+test+lint)
  l3_filename_globs: []          # 예: ["**/*payment*", "**/*auth*"] — 고위험 도메인(plan+리뷰 필수)
  l2_content_keywords: []        # 내용 escalation: L1 → L2
  l3_content_keywords: []        # 내용 escalation: L1/L2 → L3
  content_l3_enforce: warn       # warn(하위호환) | block. content-only L3 를 구현 전에 차단할지
  domains: []                    # [{ id, risk_level, path_globs, content_keywords, protocol_pointer }]
  desktop_block_glob: ""         # 동기화 산출물/금지 경로 직접수정 BLOCK. 예: "dist/**" | "**/generated/**"
  desktop_block_hint: ""         # 차단 메시지 힌트. 예: "원본 수정 후 빌드/동기화"
  plan_glob: ""                  # plan 문서 스캔 글롭(루트 상대). 예: "plan_docs/**/*.md"
  l3_review_strategy: ""         # L3 review 매칭 canonical 선택(미선택=L3 안전 BLOCK): claude_grep_first | codex_feature_signal | <모듈명>
  l3_review_glob: ""             # current-cycle pre-implementation 2-round review 문서 전용 glob
  generic_tokens: []             # (전략 확장) codex_feature_signal stopword — 스택특화 토큰(프레임워크/언어명)
  review_patterns: []            # (전략 확장) claude_grep_first 추가 리뷰 마커 정규식

# --- hook 런타임 계약 (cores 가 직접 읽는 top-level 키. 어댑터가 profile 전체를 core 에 전달) ---
file_type_map: []                # post-tool-logger: [{ glob: "src/**", type: backend }] 첫매치 분류
skip_untyped: true               # post-tool-logger: file_type_map 미분류 파일 로깅 skip
# phase4_trigger_glob 은 pdca.phases[04] 와 같은 04-analyze 를 가리키나 별도 키다 — 매칭엔진이 다르기 때문:
# 여긴 fnmatch(`*..*.md`, 직속 파일), pdca 어댑터는 glob.glob recursive(`**/*.md`, 하위 포함). 합치면 거동이 달라짐.
# 04-analyze 디렉토리명을 바꾸면 두 키를 함께 갱신할 것.
phase4_trigger_glob: "*plan_docs/04-analyze/*.md"   # pre-phase4-checklist-gate 발동 글롭(fnmatch)
suffixes: []                     # pre-phase4: PDCA phase 접미사(빈값=framework 기본)
checklist_scan_targets: []       # pre-phase4: 체크리스트 스캔 대상 글롭
compliance:                      # stop-compliance-report (전부 빈값=해당 검사 비활성, 채우면 활성)
  activity_groups: []            # 예: [{ label: 백엔드, types: [backend-main, backend-test] }] — 빈값이면 raw type 별 generic 그룹
  plan_types: []                 # plan 활동으로 칠 type. 예: [plan-doc]
  plan_gate_code_types: []       # "코드 변경"으로 칠 type(plan 없으면 WARN) — stop/output_contract/knowledge_capture 공용
  plan_gate_text: ""             # code_without_plan WARN 메시지(빈값=기본)
  convention_reminder: {}        # 예: { types: [backend-main], text: "백엔드 컨벤션 검증 확인 권장" }

output_contract:                 # (codex-only) stop 리포트 Output Contract 섹션 마커. 빈값=중립 기본(EH-2)
  markers: {}                    # 예: { Impact: [impact, 영향, backend, frontend], Validation: [검증, build, test, gradlew] }
                                 #     채우면 프로젝트 고유 토큰으로 검사(엔진 기본은 스택 토큰 0=중립). hit≥(마커수-1) → OK

pdca:                            # PDCA phase 의무구조 — pre-implementation-gate 가 강제(게이트 teeth). 상세: docs/agent/pdca-templates.md
  enabled: true                  # SAGE 기본 ON. 비-PDCA 프로젝트는 false 로 끔(게이트는 risk/plan-doc 만 확인 — 하위호환)
  phases:                        # 표준 00~06. id + glob(root 상대, 독립). 디렉토리명 변경 시 glob 만 교체
    - { id: "00", glob: "plan_docs/00-base_plan/**/*.md" }   # CONTEXT: 전략·영향·사전지식·리스크
    - { id: "01", glob: "plan_docs/01-plan/**/*.md" }        # CONTENT: 요구사항·데이터·API
    - { id: "02", glob: "plan_docs/02-design/**/*.md" }      # 설계·시퀀스·에러코드
    - { id: "03", glob: "plan_docs/03-implementation/**/*.md" }  # 구현·파일소유·체크리스트·빌드/테스트
    - { id: "04", glob: "plan_docs/04-analyze/**/*.md" }     # 설계-구현 gap (판정 금지)
    - { id: "05", glob: "plan_docs/05-expert-review/**/*.md" }   # 독립 종합 + 최종 판정(APPROVED/FAIL/BLOCKED)
    - { id: "06", glob: "plan_docs/06-report/**/*.md" }      # 완료 보고(05 APPROVED 후에만)
  pre_implementation_required:   # 코드 변경 전 존재해야 할 phase(위험 레벨별). 누락 시 L2/L3 BLOCK · L1 WARN
    L1: ["00"]                   # 03 은 구현 문서(파일소유+체크리스트) — L2/L3 소스 편집 전에 반드시 존재해야
    L2: ["00", "01", "02", "03"] # 함. root 스캐폴딩/설정/글루(build·local.properties·.gitignore 등)도 소스 편집이라
    L3: ["00", "01", "02", "03"] # 03 선행 대상(컴포넌트 소유 여부와 무관 — risk 글롭으로 분류).
  report_phase: "06"             # 이 phase 문서 작성 시 approve_phase 승인 확인
  approve_phase: "05"            # report 전 APPROVED 가 있어야 할 phase
  approve_marker: "APPROVED"     # approve_phase 문서에서 찾을 승인 마커(대소문자 무시)
  review_loop:                   # Loop A — Phase 05 적대적 review-rework(찾기→반박→분류→수정→종료). 본문은 sage-review 스킬이 host 에서 실행, 여긴 게이트값만(결정론). 상세: docs/agent/review-protocol.md
    enabled: false               # 기본 OFF — 켜면 sage-review 가 단발 리뷰 대신 적대적 루프로 동작(advisory 먼저 권장)
    lenses: [correctness, security, concurrency, convention, lifecycle]  # FIND 렌즈(엔진 어휘). enabled 면 비울 수 없음
    refuters: 2                  # finding 당 반박자 수. 생존 = 반증표 < ⌈refuters/2⌉(보수적 false-positive 필터)
    refute_threshold: majority   # v1=majority 고정
    max_iterations: { L2: 1, L3: 3 }      # risk-tier 비례 반복 상한. 초과 미수렴 → BLOCKED
    dry_rounds: 1                # K라운드 연속 신규 0 → 수렴(APPROVED)
    budget_tokens: { L2: 150000, L3: 600000 }   # loop-until-budget. 초과 → BLOCKED
    cross_model: from_options.cross_model        # FIND 단계에 opposite-runtime peer 리뷰어 1명 추가(sage cross-check). 문제를 *찾는* 쪽 — refuters(반박자) 아님. options.cross_model 연동
    severity_block: [P0, P1]     # 미해결 시 APPROVED 불가한 심각도
    architecture_escalation: from_risk.l3        # arch 변경 finding → BLOCKED(사람). risk.l3_* 재사용(중복정의 금지)
    termination_enforce: advisory                # 종료 검산 모드: advisory(불일치 경고만, 측정용) | enforce(불일치 close 거부). 수렴률 측정 후 enforce 전환 권장
    report_gate_enforce: advisory                # 06←05 audit 게이트: off(마커만) | advisory(WARN) | enforce(BLOCK). 05 가 가리키는 loop run 이 closed+APPROVED 인지 검사. enforce 는 모든 05 가 루프 돌 때만 안전

  # retro:                          # Loop C(sage retro --check) 실행 여부를 Stop 훅이 사후 확인(9-C v1).
  #   report_gate_enforce: off      # off | advisory(WARN) | enforce(BLOCK, 양 host·세션당 최대 1회).
  #                                  # Claude는 exit 2, Codex는 Stop decision:block wire를 사용.
  #                                  # enforce 켜려면 knowledge_capture.retro_note 도 켜야 의미가 있다(안 그러면 노트 자체가 안 생김).

  # writeback:                      # L2/L3 write-back 심층 노트가 host depth self-review 를 거쳤는지 Stop 훅이 사후 확인.
  #   depth_review_gate: off        # off | advisory(WARN) | enforce(BLOCK, 양 host·세션당 최대 1회).
  #                                  # 06 헤더의 `Depth-Self-Review: performed` 자기선언을 검사(품질 아닌 self-review 실행 증거).
  #                                  # enforce 켜려면 knowledge_capture.update_after_dev 도 켜야 의미가 있다(안 그러면 노트 자체가 안 생김).

conventions: []                  # 예: [{ scope: backend, stack: "<stack>", doc: sage/conventions/<name>.md, file_globs: ["**/*.<ext>"] }]

verification:                    # 결정론 검증 — scripts/verify-changes.sh 가 gate_policy 레벨→commands 로 실행
  gate_policy:
    L1: { checks: [syntax],                    mode: advisory }
    L2: { checks: [build, test, lint],         mode: block }
    L3: { checks: [build, test, lint, review], mode: block }
  commands:                      # 프로젝트 전역 결정론 명령(컴포넌트 무관 — 단일/다중모듈 공통). 빈값=skip
    syntax: ""                   # L1 (예: 컴파일러/파서 syntax 체크, 프로젝트 전역)
    build:  ""                   # L2/L3 (예: "./gradlew build" | "npm run build")
    test:   ""
    lint:   ""
    # review = 셸 명령 아님 → L3 독립 리뷰 프로토콜(profile.risk.l3_review_strategy). verify-changes.sh 미실행
  acceptance:                    # 사용자 요구사항별 수용증거. 빌드/테스트가 "요건 만족"을 자동 증명하지 않는 갭 보강.
    enabled: true                 # 01 acceptance matrix → 04 PASS/FAIL/NOT TESTED evidence → 05/06 gate
    require_for_risk: [L2, L3]    # L1/L2 범위 조정 가능, L3 제거 불가(runtime+validate 불변식)
    statuses: [PASS, FAIL, NOT TESTED, N/A]
    unresolved_statuses: [FAIL, NOT TESTED]
    report_gate_by_risk:          # 위험도 기본 정책. L3를 profile만으로 advisory 하향할 수 없음.
      L2: advisory
      L3: enforce
    waiver:
      enabled: true               # exact cycle + required acceptance ID의 명시적 CLI grant만 소비

runtime:                         # host runtime 모델 (§2.2). Claude 특권화 금지
  installed_hosts: [claude]      # 원하는 discovery surface. double-host면 [claude, codex]
  active_host: claude            # 현재 단일 host. handoff 시 사용자가 명시 변경
  external_reviewer: clean_context_same_runtime   # opposite_runtime | clean_context_same_runtime
  asset_ssot: deferred

team:                            # CORE 로스터(team.core). 역할명은 스택 중립 — 컴포넌트 매핑은 owns 가 담당. reviewer = Phase 05
  # 아래 5인 외에 convention-checker 도 CORE 에이전트다(기본값으로 충분해 항목을 생략).
  # runtime 을 주려면 `convention-checker: { runtime: { effort: low } }` 처럼 추가하면 된다.
  # `runtime: { model, effort }` 은 선택. 넣으면 claude host 의 .claude/agents/<id>.md frontmatter 로
  # 주입된다. 값을 바꾼 뒤엔 `sage install --force` 로 렌더를 재배포(`sage doctor` 가 stale 로 알려줌).
  # codex host 는 .codex/agents/*.md 에 해석 기전이 없어 무동작.
  #   model  : opus | sonnet | haiku | fable | inherit | 전체 모델 id   (미설정 → host CLI 기본 모델)
  #   effort : low | medium | high | xhigh | max | 양의 정수            (미설정 → high)
  # 예) reviewer: { enabled: true, runtime: { model: opus, effort: max }, cross_model: {...} }
  core:
    leader:        { enabled: true }
    implementer-a: { enabled: true,  owns: [] }   # profile.components 의 컴포넌트 id 1개 할당(예: [core])
    implementer-b: { enabled: true,  owns: [] }   # 두 번째 컴포넌트(단일 컴포넌트면 enabled:false 로 끔)
    qa:            { enabled: true,  owns: ["**/test/**"] }
    reviewer: { enabled: true,
                cross_model: { capability: from_options.cross_model,
                               on_unavailable: block } }
  optional_reviewers: []         # roster 밖 온디맨드 (external-consultant류)
  extensions: []

cross_model:                     # opposite-runtime 무상관 검증. 권장 optional
  policy: recommended            # required | recommended | off. local은 required를 완화할 수 없음
  peer: opposite_runtime         # host=claude → codex / host=codex → claude (하드코딩 금지)
  on_unavailable: block
  # reviewer: { host: codex, model: gpt-5.6-terra } # 사용자 입력. host는 active_host의 반대.
  # effort: high                 # 선택. 미설정 → high. options.cross_model=true 일 때만 유효.
  #                              #   peer=codex  : minimal | low | medium | high | xhigh
  #                              #   peer=claude : low | medium | high | xhigh | max
  #                              # reviewer 미설정 시 peer CLI default model 사용(하위호환).
  # peer CLI 가용성은 sage doctor 가 which(codex)/which(claude) 로 직접 판정한다.
  # claude-host → `codex exec`, codex-host → `claude -p` 를 SAGE 가 직접 호출(외부 도구 불필요).

capabilities: {}                 # 선택: { codex: true, claude: true } 로 PATH 보강 선언 가능

hooks:
  enabled: true
  project_root_env: "SAGE_PROJECT_ROOT"   # 미설정 시 CLAUDE_PROJECT_DIR/CODEX_PROJECT_ROOT fallback
  register: [claude]             # cross_model on이면 [claude, codex]
  tests: ".{claude,codex}/hooks/tests"

codegraph:
  enabled: from_options.codegraph
  mcp: "codegraph"
  degraded_features: ["symbol trace/impact 불가", "대규모 탐색 rg/read degrade"]

knowledge_capture:               # obsidian
  vault_path: ""                 # 마스터 게이트: 비면 vault 기능 전부 OFF (graceful N/A)
  provider: obsidian
  mcp_check: true
  scan_before_dev: true
  update_after_dev: true
  note_convention:
    folder: "wiki"
    filename_pattern: "{prefix} - {title}.md"
    prefixes: []
    flat: true
    tags_style: frontmatter    # frontmatter | inline | none — vault 규칙 따름(sage-init 이 vault 조사해 제안). 기본 frontmatter
    index: ""                  # 목차 파일명(예: index.md). 비면 index 갱신 안 함(index 없는 vault 존중)
    required_structure: {}     # PREFIX → 필수 마커(라인 시작 문자열) 목록. write-back 신규 노트가 authoring
                               # guide 형식을 갖췄는지 advisory 로 확인(누락=WARN, 차단 안 함). 비면(기본) 검사 OFF.
                               # 마커 **존재**만 결정론 확인(깊이는 skill 지침·host depth self-review 영역). PREFIX 는 정확
                               # 일치 우선·대소문자 무시 폴백. sage-init 이 vault 규칙 조사해 채운다.
                               # L2/L3 심층 노트 골격 예(prefix 무관 7섹션 — 재발 방지·향후·잔여 리스크 포함):
                               #   { BUG:  ["> [!abstract]", "## 배경", "## 설계 결정", "## 변경 내역", "## 검증", "## 재발 방지", "## 관련 문서"],
                               #     TECH: ["> [!abstract]", "## 배경", "## 설계 결정", "## 변경 내역", "## 검증", "## 재발 방지", "## 관련 문서"] }
  loop_audit_dashboard: false    # 루프 종료 시 vault 에 Loop A 감사 대시보드 자동 갱신(sage review-loop show --vault). vault_path 필요
  retro_note: false              # sage retro 시 vault 에 human-gate 회고 노트 자동 작성(--vault). vault_path 필요

context_management:
  compaction:
    enabled: true
    preserve: [architectural_decisions, open_bugs, file_ownership, pending_verifications]
