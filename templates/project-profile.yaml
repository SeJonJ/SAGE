# SAGE project-profile.yaml — 단일 가변 SSOT (빈 스키마 템플릿)
# sage install 이 배치 → AI 대화로 값 채움. 스키마 키는 고정, 값만 채운다 (결정론 제약).
# 전문/주석: 마스터 설계 §6.

project:
  name: ""
  prefix: "sage"

options:                         # 옵션 플래그 — generator가 읽어 산출물 가감
  cross_model: false             # reviewer 슬롯을 opposite-runtime reviewer로 승격 + opposite 산출물
  codegraph:   optional
  obsidian:    optional

paths:
  framework_docs: "."
  agent_docs: "docs/agent"
  sage_home: "sage"
  plan_docs: "plan_docs"
  component_plan_docs: "{component}/plan_docs"
  # 고정(이동 불가): .claude/ · .codex/ · 루트 CLAUDE.md/CODEX.md

components: []                    # 예: [{ id: backend, paths: ["src/backend/**"] }]

risk:                            # pre-implementation-gate / stop-compliance 가 읽는 위험 분류(flat 계약)
  # 경로 글롭(L0 통과 / L1·L2·L3 분류). 빈 리스트 = 해당 레벨 미적용
  l0_pass_globs: []              # 예: ["*.md", "plan_docs/*"] — 문서/plan 즉시 통과
  l1_path_globs: []              # 예: ["**/*.css", "**/static/**"] — 저위험(UI/마크업)
  l2_path_globs: []              # 예: ["src/**", "**/*.config.*"] — 소스/설정(build+test+lint)
  l3_filename_globs: []          # 예: ["**/*payment*", "**/*auth*"] — 고위험 도메인(plan+리뷰 필수)
  l2_content_keywords: []        # 내용 escalation: L1 → L2
  l3_content_keywords: []        # 내용 escalation: L1/L2 → L3
  desktop_block_glob: ""         # 동기화 산출물/금지 경로 직접수정 BLOCK. 예: "dist/**" | "**/generated/**"
  desktop_block_hint: ""         # 차단 메시지 힌트. 예: "원본 수정 후 빌드/동기화"
  plan_glob: ""                  # plan 문서 스캔 글롭(루트 상대). 예: "plan_docs/**/*.md"
  l3_review_strategy: ""         # L3 review 매칭 canonical 선택(미선택=L3 안전 BLOCK): claude_grep_first | codex_feature_signal | <모듈명>
  generic_tokens: []             # (전략 확장) codex_feature_signal stopword — 스택특화 토큰(프레임워크/언어명)
  review_patterns: []            # (전략 확장) claude_grep_first 추가 리뷰 마커 정규식

# --- hook 런타임 계약 (cores 가 직접 읽는 top-level 키. 어댑터가 profile 전체를 core 에 전달) ---
file_type_map: []                # post-tool-logger: [{ glob: "src/**", type: backend }] 첫매치 분류
skip_untyped: true               # post-tool-logger: file_type_map 미분류 파일 로깅 skip
phase4_trigger_glob: "*plan_docs/04-analyze/*.md"   # pre-phase4-checklist-gate 발동 글롭
suffixes: []                     # pre-phase4: PDCA phase 접미사(빈값=framework 기본)
checklist_scan_targets: []       # pre-phase4: 체크리스트 스캔 대상 글롭
compliance:                      # stop-compliance-report
  convention_reminder: {}        # 예: { types: [backend], text: "백엔드 컨벤션 검증 확인 권장" }

conventions: []                  # 예: [{ scope: backend, stack: "<stack>", doc: sage/conventions/<name>.md, file_globs: ["**/*.<ext>"] }]

verification:                    # 결정론 검증
  gate_policy:
    L1: { checks: [syntax],                    mode: advisory }
    L2: { checks: [build, test, lint],         mode: block }
    L3: { checks: [build, test, lint, review], mode: block }
  backend:  {}                   # { build: "...", test: "...", lint: "..." }
  frontend: {}                   # { syntax: "node --check {file}", test: "...", lint: "..." }

runtime:                         # host runtime 모델 (§2.2). Claude 특권화 금지
  host: claude                   # claude | codex — 설치 시 택1
  external_reviewer: clean_context_same_runtime   # opposite_runtime | clean_context_same_runtime
  asset_ssot: deferred

team:                            # CORE 5인. reviewer = Phase 05 수행자
  core:
    leader:   { enabled: true,  model: opus }
    backend:  { enabled: true,  model: opus,   owns: [backend] }
    frontend: { enabled: true,  model: opus,   owns: [frontend] }
    qa:       { enabled: true,  model: sonnet, owns: ["**/test/**"] }
    reviewer: { enabled: true,  model: sonnet,
                cross_model: { capability: from_options.cross_model,
                               fallback: clean_context_same_runtime } }
  optional_reviewers: []         # roster 밖 온디맨드 (external-consultant류)
  extensions: []

cross_model:                     # opposite-runtime 무상관 검증. 권장 optional
  peer: opposite_runtime         # host=claude → codex / host=codex → claude (하드코딩 금지)
  requires: [gstack]             # claude-host opposite 전제(§3.2.1). doctor 가 가용성 판정
  invocation:
    claude_host: "/codex consult (gstack)"   # requires: gstack
    codex_host:  ""              # Claude 호출 경로 — v1 설계 미해결 (§12) → fallback
  on_unavailable: clean_context_same_runtime

capabilities: {}                 # 선택: { gstack: true } 로 가용성 선언(PATH which 보강)

hooks:
  enabled: true
  project_root_env: "SAGE_PROJECT_ROOT"   # 미설정 시 CLAUDE_PROJECT_DIR/CODEX_PROJECT_ROOT fallback
  register: [claude]             # cross_model on이면 [claude, codex]
  tests: ".{claude,codex}/hooks/tests"

codegraph:
  enabled: from_options.codegraph
  mcp: "codegraph"
  degraded_features: ["symbol trace/impact 불가", "대규모 탐색 rg/read degrade"]

knowledge_capture:               # obsidian
  vault_path: ""                 # 마스터 게이트: 비면 vault 기능 전부 OFF (graceful N/A)
  provider: obsidian
  mcp_check: true
  scan_before_dev: true
  update_after_dev: true
  note_convention: { folder: "wiki", filename_pattern: "{prefix} - {title}.md", prefixes: [], flat: true }

context_management:
  compaction:
    enabled: true
    preserve: [architectural_decisions, open_bugs, file_ownership, pending_verifications]
