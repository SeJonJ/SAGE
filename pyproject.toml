[project]
name = "sage-harness"
version = "0.1.0"
description = "System for Agentic Governance & Engineering — runtime-selectable AI harness framework"
requires-python = ">=3.10"
dependencies = [
  "pyyaml>=6.0",
]

[project.scripts]
sage = "sage.cli:main"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["sage*"]
